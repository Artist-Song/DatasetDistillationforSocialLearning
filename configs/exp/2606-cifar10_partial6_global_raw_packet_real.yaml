seed: 42
device: cuda

dataset:
  name: cifar10
  root: ./data
  image_size: [32, 32]
  num_classes: 10

split:
  mode: partial_known
  name: cifar10_partial6
  num_agents: 5
  known_classes_per_agent: 6
  missing_classes_per_agent: 4

model:
  name: conv
  norm_type: instance

method:
  name: generalist_guided_global_raw_packet_real

train:
  epochs: 50
  batch_size: 128
  lr: 0.01

generalist:
  epochs: 50
  lr: 0.01

specialist:
  epochs: 50
  lr: 0.01

packet:
  source: global_raw_packet
  ipc: 10
  temperature: 2.0
  image_channels: 3
  bytes_per_float: 4
  stage1_train_samples: 50000

social_head:
  epochs: 30
  lr: 0.005
  weight_decay: 0.0005
  samples_per_class: 8
  steps_per_epoch: 200
  lambda_packet_ce: 1.0
  lambda_packet_kd: 1.0
  lambda_known_ce: 1.0
  lambda_retain: 1.0

output:
  root: ./outputs
