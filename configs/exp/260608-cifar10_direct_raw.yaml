seed: 42
device: cuda

dataset:
  name: cifar10
  root: ./data
  image_size: [32, 32]
  num_classes: 10

split:
  mode: direct
  num_agents: 5
  classes_per_agent: 2

model:
  name: conv
  norm_type: instance

method:
  name: local_only

train:
  epochs: 50
  batch_size: 128
  lr: 0.01

packet:
  source: raw
  ipc: 10
  temperature: 2.0

social:
  epochs: 30
  lr: 0.005
  lambda_packet: 1.0
  lambda_kd: 1.0
  lambda_retain: 1.0
  packet_kd_mode: sender_subset
  policy: all_to_all

output:
  root: ./outputs
