seed: 42
experiment_id: 2610-cifar10-p6-ipc50-cd2like-weakretain-dsdm2000
device: cuda

reuse:
  source_experiment_id: 2610-cifar10_partial6_global_raw_packet_real_ipc50_cd2_like
  generalist: true
  specialists: true
  packets: false

dataset:
  name: cifar10
  root: ./data
  image_size: [32, 32]
  num_classes: 10

split:
  mode: partial_known
  name: cifar10_partial6
  num_agents: 5
  known_classes_per_agent: 6
  missing_classes_per_agent: 4

model:
  name: conv
  norm_type: instance

method:
  name: generalist_guided_global_dsdm_packet_cd2like_weakretain_dsdm2000

train:
  epochs: 50
  batch_size: 128
  lr: 0.01

generalist:
  epochs: 50
  lr: 0.01

specialist:
  epochs: 50
  lr: 0.01

packet:
  source: global_dsdm_packet
  ipc: 50
  temperature: 2.0
  image_channels: 3
  bytes_per_float: 4
  stage1_train_samples: 50000
  distill_steps: 2000
  distill_lr: 0.005
  mom_img: 0.5
  batch_real: 256
  batch_syn_max: 256
  dsdm_init: random
  factor: 1
  decode_type: single
  aug_type: color_crop_cutout
  idx_from: 2
  idx_to: -1
  metric: l1
  cov_weight: 50.0
  smooth_iter: 200
  smooth_factor: 0.99
  h_p_weight: 0.2

social_head:
  train_mode: social_head_only_balanced
  epochs: 50
  lr: 0.005
  weight_decay: 0.0005
  samples_per_class: 8
  steps_per_epoch: 100
  lambda_packet_ce: 1.0
  lambda_packet_kd: 0.0
  lambda_known_ce: 0.1
  lambda_retain: 0.01

output:
  root: ./outputs
