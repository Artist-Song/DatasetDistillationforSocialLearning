seed: 42
experiment_id: 2610-cifar10-p6-ipc50-cd2like-kd01
device: cuda

reuse:
  source_experiment_id: 2610-cifar10_partial6_global_raw_packet_real_ipc50_cd2_like
  generalist: true
  specialists: true
  packets: true

dataset:
  name: cifar10
  root: ./data
  image_size: [32, 32]
  num_classes: 10

split:
  mode: partial_known
  name: cifar10_partial6
  num_agents: 5
  known_classes_per_agent: 6
  missing_classes_per_agent: 4

model:
  name: conv
  norm_type: instance

method:
  name: generalist_guided_global_raw_packet_cd2like_kd01

train:
  epochs: 50
  batch_size: 128
  lr: 0.01

generalist:
  epochs: 50
  lr: 0.01

specialist:
  epochs: 50
  lr: 0.01

packet:
  source: global_raw_packet
  ipc: 50
  temperature: 2.0
  image_channels: 3
  bytes_per_float: 4
  stage1_train_samples: 50000

social_head:
  train_mode: social_head_only_balanced
  epochs: 50
  lr: 0.005
  weight_decay: 0.0005
  samples_per_class: 8
  steps_per_epoch: 100
  lambda_packet_ce: 1.0
  lambda_packet_kd: 0.1
  lambda_known_ce: 0.2
  lambda_retain: 0.05

output:
  root: ./outputs
