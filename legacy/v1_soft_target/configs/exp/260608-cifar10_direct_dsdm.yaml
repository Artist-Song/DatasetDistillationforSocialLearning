seed: 42
device: cuda

dataset:
  name: cifar10
  root: ./data
  image_size: [32, 32]
  num_classes: 10

split:
  mode: direct
  num_agents: 5
  classes_per_agent: 2

model:
  name: conv
  norm_type: instance

method:
  name: local_only

train:
  epochs: 50
  batch_size: 128
  lr: 0.01

packet:
  source: dsdm
  ipc: 10
  temperature: 2.0
  distill_steps: 2000
  distill_lr: 0.005
  mom_img: 0.5
  batch_real: 256
  batch_syn_max: 256
  dsdm_init: random
  factor: 1
  decode_type: single
  aug_type: color_crop_cutout
  idx_from: 2
  idx_to: -1
  metric: l1
  cov_weight: 50.0
  smooth_iter: 200
  smooth_factor: 0.99
  h_p_weight: 0.2

social:
  epochs: 30
  lr: 0.005
  lambda_packet: 1.0
  lambda_kd: 1.0
  lambda_retain: 1.0
  packet_kd_mode: sender_subset
  policy: all_to_all

packet_only:
  epochs: 30
  lr: 0.005
  lambda_kd: 1.0
  packet_kd_mode: sender_subset
  lambda_retain: 0.0
  freeze_backbone: false

output:
  root: ./outputs/260608-cifar10_direct
